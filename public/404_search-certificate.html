<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página não encontrada</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body { background: #f5f7fa; color: #333; font-family: Arial, sans-serif; }
        .centered { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .error-code { font-size: 6rem; font-weight: bold; color: #1976d2; }
        .error-message { font-size: 1.5rem; margin-bottom: 1rem; }
        .back-link { margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="centered">
        <div class="error-code">404</div>
        <div class="error-message">Não foi possível encontrar uma rota para 'GET: search-certificate'</div>
        <div>Verifique se o endereço está correto ou volte para a <a href="/">página inicial</a>.</div>
        <div class="back-link">
            <a href="/" class="btn btn-primary">Voltar para o início</a>
        </div>
    </div>
</body>
</html>
